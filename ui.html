<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Organic Variants</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --panel: rgba(255, 255, 255, 0.94);
        --line: #e2e8f0;
        --line-strong: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #0f172a;
        --accent-strong: #020617;
        --accent-soft: #f1f5f9;
        --ring: rgba(15, 23, 42, 0.12);
        --danger: #dc2626;
        --success: #166534;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        padding: 16px;
        background:
          radial-gradient(circle at top, rgba(148, 163, 184, 0.14), transparent 36%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--text);
        font:
          13px/1.45 Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .panel {
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 20px;
        padding: 20px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 16px 40px rgba(15, 23, 42, 0.08);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
        padding: 5px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(248, 250, 252, 0.92);
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }

      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        outline: none;
        background: #fff;
        color: var(--text);
        box-shadow: inset 0 1px 1px rgba(15, 23, 42, 0.02);
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease,
          background-color 120ms ease;
      }

      input::placeholder {
        color: #94a3b8;
      }

      input:focus {
        border-color: var(--line-strong);
        box-shadow: 0 0 0 4px var(--ring);
      }

      input[type='file'] {
        padding: 8px;
        background: var(--accent-soft);
      }

      input[type='file']::file-selector-button {
        margin-right: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: #fff;
        color: var(--text);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(2, 6, 23, 0.08);
        border-radius: 12px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #fff;
        background: linear-gradient(180deg, #1e293b 0%, var(--accent-strong) 100%);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          opacity 120ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow:
          0 10px 24px rgba(15, 23, 42, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
        transform: none;
      }

      .meta {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        font-size: 11px;
        color: var(--muted);
      }

      .status {
        min-height: 20px;
        margin: 12px 0 0;
        border-radius: 10px;
        color: var(--success);
        font-weight: 600;
      }

      .error {
        min-height: 20px;
        margin: 12px 0 0;
        border-radius: 10px;
        color: var(--danger);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="eyebrow">Organic Guide</div>
      <h1>KR 얼리버드 오가닉 생성기</h1>
      <p>오가닉 가이드 4개 시안을 현재 페이지에 바로 생성합니다.</p>
      <form id="form">
        <div class="field">
          <label for="job_title">직업명</label>
          <input id="job_title" name="job_title" maxlength="60" required />
        </div>
        <div class="field">
          <label for="speaker_name">연사명</label>
          <input id="speaker_name" name="speaker_name" maxlength="60" required />
        </div>
        <div class="field">
          <label for="d_day">디데이 숫자</label>
          <input id="d_day" name="d_day" inputmode="numeric" pattern="[0-9]+" required />
        </div>
        <div class="field">
          <label for="image_link">공개 구글 드라이브 이미지 링크</label>
          <input id="image_link" name="image_link" type="url" />
        </div>
        <div class="field">
          <label for="image_file">또는 이미지 파일 업로드</label>
          <input id="image_file" name="image_file" type="file" accept="image/*" />
        </div>
        <button id="submit" type="submit">Generate</button>
      </form>
      <div id="error" class="error"></div>
      <div id="status" class="status"></div>
      <div class="meta">기준 위치: 선택 노드 좌표 또는 현재 보이는 캔버스 영역 시작점</div>
    </div>

    <script>
      const form = document.getElementById('form')
      const submitButton = document.getElementById('submit')
      const errorNode = document.getElementById('error')
      const statusNode = document.getElementById('status')
      const imageFileInput = document.getElementById('image_file')

      let templates = []
      let uploadedImageBytes = null

      window.addEventListener('message', (event) => {
        const pluginMessage = event.data.pluginMessage
        if (pluginMessage && pluginMessage.type === 'error') {
          setError(pluginMessage.message)
          submitButton.disabled = false
          return
        }
        if (pluginMessage && pluginMessage.type === 'status') {
          setStatus(pluginMessage.message)
        }
      })

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        setError('')

        const payload = {
          jobTitle: form.job_title.value.trim(),
          speakerName: form.speaker_name.value.trim(),
          dDay: form.d_day.value.trim(),
          imageLink: form.image_link.value.trim(),
          uploadedImageBytes: uploadedImageBytes,
        }

        if (!/^\d+$/.test(payload.dDay)) {
          setError('디데이는 숫자만 입력할 수 있습니다.')
          return
        }

        if (!payload.uploadedImageBytes && !payload.imageLink) {
          setError('구글 드라이브 링크를 넣거나 이미지 파일을 업로드해 주세요.')
          return
        }

        if (!templates.length) {
          setError('템플릿 데이터를 불러오지 못했습니다.')
          return
        }

        submitButton.disabled = true
        setStatus('생성 준비 중...')
        parent.postMessage(
          {
            pluginMessage: {
              type: 'generate',
              payload: {
                ...payload,
                templates,
              },
            },
          },
          '*',
        )
      })

      imageFileInput.addEventListener('change', function (event) {
        const files = event.target && event.target.files ? event.target.files : null
        const file = files && files[0] ? files[0] : null

        if (!file) {
          uploadedImageBytes = null
          return
        }

        const reader = new FileReader()
        reader.onload = function () {
          const result = reader.result
          if (!result) {
            uploadedImageBytes = null
            setError('업로드한 이미지를 읽지 못했습니다.')
            return
          }

          const bytes = new Uint8Array(result)
          uploadedImageBytes = Array.prototype.slice.call(bytes)
          setError('')
          setStatus('업로드 이미지 준비 완료')
        }
        reader.onerror = function () {
          uploadedImageBytes = null
          setError('업로드한 이미지를 읽지 못했습니다.')
        }
        reader.readAsArrayBuffer(file)
      })

      try {
        if (Array.isArray(window.__TEMPLATES__) && window.__TEMPLATES__.length === 4) {
          templates = window.__TEMPLATES__
        } else {
          setError('템플릿 데이터를 읽지 못했습니다.')
        }
      } catch (error) {
        setError(error instanceof Error ? error.message : '초기화에 실패했습니다.')
      }

      function setError(message) {
        errorNode.textContent = message
        if (message) {
          submitButton.disabled = false
        }
      }

      function setStatus(message) {
        statusNode.textContent = message || ''
      }
    </script>
